<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .product {
            background: white;
            width: 250px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #218838;
        }

        #cart {
            background: white;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
            max-width: 500px;
        }
    </style>
</head>
<body>

<header>
    <h1>My E-Commerce Store</h1>
</header>

<div class="container">
    <div class="product">
        <img src="https://via.placeholder.com/250x180" alt="Product 1">
        <h3>Smartphone</h3>
        <p>Price: ₹15,000</p>
        <button onclick="addToCart('Smartphone',15000)">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x180" alt="Product 2">
        <h3>Laptop</h3>
        <p>Price: ₹45,000</p>
        <button onclick="addToCart('Laptop',45000)">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x180" alt="Product 3">
        <h3>Headphones</h3>
        <p>Price: ₹2,000</p>
        <button onclick="addToCart('Headphones',2000)">
            Add to Cart
        </button>
    </div>
</div>

<div id="cart">
    <h2>Shopping Cart</h2>
    <ul id="cartItems"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
</div>

<script>
    let total = 0;

    function addToCart(product, price) {
        let cartItems = document.getElementById("cartItems");

        let li = document.createElement("li");
        li.textContent = product + " - ₹" + price;
        cartItems.appendChild(li);

        total += price;
        document.getElementById("total").textContent = total;
    }
</script>

</body>
</html>
